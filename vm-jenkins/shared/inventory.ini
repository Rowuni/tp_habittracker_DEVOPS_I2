[all:vars]
ansible_python_interpreter=/usr/bin/python3

# VM cible (connexion SSH avec la clé Vagrant)
[vms]
vm-docker ansible_host=192.168.56.11 ansible_user=vagrant

[vms:vars]
ansible_ssh_private_key_file=~/.ssh/vm_docker_key
ansible_become=true
ansible_become_method=sudo

# Conteneurs statiques sur vm-docker (pilotés via l'API Docker TCP depuis vm-jenkins)
[containers]
static-container-1
static-container-2

[containers:vars]
ansible_connection=community.docker.docker
ansible_docker_extra_args=-H tcp://192.168.56.11:2375
ansible_become=false
